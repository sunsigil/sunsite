		<h1>Photography</h1>
		<p data-text_block="True">
			On occasion, I like to do some photography, mostly on film.
			I shoot on an old Olympus point-and-shoot, and use whatever film was cheapest at Yodobashi.
			These days I ship my film to Northeast Photographic for development.
